  <title>여긴 어디? - 경북 음식 지도</title>
  <style>
    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: #0f1720;
    }

    .app-shell {
  position: relative;
  width: 100vw;
  height: 100dvh;
  overflow: hidden;
  background: none;
}

.app-stage {
  position: relative;
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: none;
}
    .map-video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      user-select: none;
      -webkit-user-drag: none;
      pointer-events: none;
      z-index: 0;
    }

    .video-dim {
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.12);
      z-index: 1;
      pointer-events: none;
    }

    .ui-layer {
      position: relative;
      width: 100%;
      height: 100%;
      z-index: 10;
    }

  .map-wrap {
  position: absolute;
  left: 50%;
  top: 50%;
  transform: translate(-50%, -50%);
  width: min(90vw, 84vh);
  aspect-ratio: 2048 / 1855;
  z-index: 12;
}


.map-area {
  position: absolute;
  left: 50%;
  top: 52%;
  width: min(95%, 95vh);
  height: 100%;
  aspect-ratio: 1440 / 1440;
  transform: translate(-50%, -50%);
  z-index: 12;
}
   .map-bg {
  position: absolute;
  inset: 0;
  width: 99.5%;
  height: 98.0%;
  object-fit: contain;
  transform: translateX(1.5px) translateY(1px) scale(1.14);
  transform-origin: center center;
}

    .svg-overlay {
  position: absolute;
  left: 5.2%;
  top: 9.5%;
  width: 100%;
  height: 100%;
  transform: translate(-7.0%, -8.3%) 
}

    .gyeongbuk-map {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      overflow: visible;
      z-index: 2;
    }

    .gyeongbuk-map .clickable-region {
      cursor: pointer;
    }

    .gyeongbuk-map .clickable-region path,
    .gyeongbuk-map path.clickable-region {
      fill: rgba(255, 255, 255, 0.01) !important;
      stroke: rgba(255, 255, 255, 0.72) !important;
      stroke-width: 2.2 !important;
      vector-effect: non-scaling-stroke;
      transition: fill 0.18s ease, filter 0.18s ease, opacity 0.18s ease;
    }

    .gyeongbuk-map .clickable-region:hover path,
    .gyeongbuk-map path.clickable-region:hover,
    .gyeongbuk-map .clickable-region.is-active path,
    .gyeongbuk-map path.clickable-region.is-active {
      fill: rgba(255, 193, 7, 0.38) !important;
      filter: drop-shadow(0 0 6px rgba(255, 193, 7, 0.8));
    }

    .region-label {
      position: fixed;
      z-index: 30;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.96);
      color: #222;
      font-size: 14px;
      font-weight: 700;
      pointer-events: none;
      transform: translate(-50%, calc(-100% - 12px));
      white-space: nowrap;
      display: none;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.15);
    }

    .top-hotspot {
      position: absolute;
      z-index: 20;
      background: rgba(255, 255, 255, 0.12);
      border: 2px solid rgba(255, 255, 255, 0.72);
      border-radius: 12px;
      cursor: pointer;
      transition: background 0.18s ease, transform 0.18s ease;
      backdrop-filter: blur(3px);
    }

    .top-hotspot:hover {
      background: rgba(255, 255, 255, 0.24);
      transform: scale(1.03);
    }

    .hint {
  position: absolute;
  left: 50%;
  bottom: 7.2%;
  transform: translateX(-50%);
  padding: 10px 18px;
  font-size: 25px;
  font-weight: 700;
  color: #5b3b12;
  background: rgba(255, 244, 210, 0.92);
  border: 2px solid rgba(120, 84, 28, 0.18);
  border-radius: 999px;
  box-shadow: 0 6px 14px rgba(0, 0, 0, 0.14);
  z-index: 50;
  white-space: nowrap;
}

 
.back-btn {
  position: absolute;
  top: 24px;
  left: 24px;
  z-index: 100;
  width: 44px;
  height: 44px;
  border-radius: 50%;
  background: rgba(255, 255, 255, 0.2);
  backdrop-filter: blur(8px); 
  -webkit-backdrop-filter: blur(8px);
  border: 1px solid rgba(255, 255, 255, 0.3);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: all 0.2s ease;
  box-shadow: 0 4px 15px rgba(0,0,0,0.2);
}

.back-btn:hover {
  background: rgba(255, 255, 255, 0.3);
  transform: translateY(-2px);
}

.back-btn:active {
  transform: scale(0.9);
}


.page-title {
  position: absolute;
  top: 80px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 55;
  margin: 0;
  font-size: 76px;
  font-weight: 900;
  color: #111;
  letter-spacing: -2px;
  text-shadow:
    -2px -2px 0 #fff,
     2px -2px 0 #fff,
    -2px  2px 0 #fff,
     2px  2px 0 #fff,
     0px  4px 10px rgba(0,0,0,0.18);
  white-space: nowrap;
  pointer-events: none;
}
.map-controls {
  position: fixed;
  top: 24px;
  right: 24px; 
  z-index: 1000;
  display: flex;
  gap: 10px;
}
.nav-btn {
  padding: 12px 20px;
  border-radius: 24px;
  border: 1px solid rgba(255, 255, 255, 0.3); 
  background: rgba(255, 255, 255, 0.2);       
  backdrop-filter: blur(8px);               
  -webkit-backdrop-filter: blur(8px);
  color: #2f4f38;                             
  font-weight: 700;
  cursor: pointer;
  transition: all 0.2s ease;
  box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
}

.nav-btn:hover {
  background: rgba(255, 255, 255, 0.4);
  transform: translateY(-2px);
}

.nav-btn:active {
  transform: scale(0.95);
}

.nav-btn.active {
  background: rgba(255, 255, 255, 0.2); 
  color: white;
  border: 1px solid rgba(255, 255, 255, 0.3);
}

.menu-card {
  width: min(90vw, 38rem); 
  padding: 2rem; 
  border-radius: 1.5rem;
  background: rgba(248, 255, 250, 0.9);
  box-shadow: 0 1rem 2rem rgba(34, 94, 54, 0.15);
  backdrop-filter: blur(10px);
    
}
.menu-btn { 
  width: 100%; 
  height: 3.5rem; 
  border-radius: 0.8rem; 
  border: none; 
  color: #fff; 
  font-weight: 700;
  font-size: 1.1rem;
  margin-bottom: 0.5rem; 
  cursor: pointer;
  background: linear-gradient(180deg, #6db785 0%, #3f8f5b 100%);
  display: flex; 
  justify-content: center;
  align-items: center;
}

button { 
    padding: 12px; cursor: pointer; border: none; border-radius: 8px;
    background: #e0e0e0; transition: transform 0.1s, background 0.2s;
  }

  button:active { transform: scale(0.98);}
  
.logout-btn { 
   width: 100%; 
  height: 3.5rem; 
  border-radius: 0.8rem; 
  font-weight: 700;
  font-size: 1.1rem; 
  margin-bottom: 0.5rem; 
  cursor: pointer;
  color: #3f8f5b;
  border: 0.12rem solid #9fd3ad;
  box-shadow: 0 0.45rem 1rem rgba(63, 143, 91, 0.08);
  background: rgba(255, 255, 255, 0.95);
  display: flex; 
  justify-content: center;
  align-items: center;
  }
  </style>

      <div class="region-label" id="regionLabel"></div>
      <div class="hint"> 지도를 보고 원하는 도시를 눌러 위치와 특징을 탐험해 봅시다. </div>

<script>
  const label = document.getElementById('regionLabel');
  const regionEls = document.querySelectorAll('.clickable-region');

  regionEls.forEach((el) => {
    const getName = () => el.dataset.name || el.dataset.region || '';

    el.addEventListener('mousemove', (e) => {
      if (!label) return;
      label.style.display = 'block';
      label.textContent = getName();
      label.style.left = e.clientX + 'px';
      label.style.top = e.clientY + 'px';
    });

    el.addEventListener('mouseleave', () => {
      if (!label) return;
      label.style.display = 'none';
    });

    el.addEventListener('touchstart', (e) => {
      if (!label) return;
      label.style.display = 'block';
      label.textContent = getName();
      const touch = e.touches[0];
      if (touch) {
        label.style.left = touch.clientX + 'px';
        label.style.top = touch.clientY + 'px';
      }
    }, { passive: true });

    el.addEventListener('touchend', () => {
      if (!label) return;
      setTimeout(() => {
        label.style.display = 'none';
      }, 500);
    }, { passive: true });

    el.addEventListener('click', () => {
      selectRegion(el.dataset.name || el.dataset.region);
    });
  });

  function selectRegion(regionName) {
  const regionMap = {
    '울진군': 'uljin/uljin_food.html',
    '예천군': 'yecheon/yecheon_food.html',
    '영양군': 'youngyang/youngyang_food.html',
    '청송군': 'chungsong/chungsong_food.html',
    '고령군': 'goryeong/goreong_food.html',
    '봉화군': 'bonghwa/bonghwa_food.html',
    '청도군': 'chungdo/chungdo_food.html',
    '의성군': 'uiseong/uiseong_food.html',
    '영덕군': 'youngduk/youngduk_food.html',
    '울릉도': 'ulleong/ulleong_food.html',
    '칠곡군': 'chilgok/chilgok_food.html',
    '성주군': 'seongju/seongju_food.html',
    '문경시': 'mungyeong/mungyeong_food.html',
    '안동시': 'andong/andong_food.html',
    '영주시': 'youngju/youngju_food.html',
    '상주시': 'sangju/sangju_food.html',
    '구미시': 'gumi/gumi_food.html',
    '김천시': 'gimcheon/gimcheon_food.html',
    '경산시': 'gyeongsan/gyeongsan_food.html',
    '포항시': 'pohang/pohang_food.html',
    '경주시': 'gyeongju/gyeongju_food.html',
    '영천시': 'youngcheon/youngcheon_food.html'
  };

  
  const targetPage = regionMap[regionName];
  if (targetPage) {
    if (window.playClick) window.playClick();
    
    setTimeout(() => {
      location.href = targetPage;
    }, 200); 
    return;
  }
  alert(regionName + ' 클릭');
}

  function goPage(type) {
    alert(type + ' 버튼 클릭');
  }
window.addEventListener('load', () => {
  if (!localStorage.getItem('hasSeenModal')) {
    openInfoModal();
    localStorage.setItem('hasSeenModal', 'true');
  }
});

function openInfoModal() {
  document.getElementById('infoModal').style.display = 'flex';
}

function closeModal() {
  document.getElementById('infoModal').style.display = 'none';
}

<style>
   
   html, body {
  margin: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: #000; 
}

   .app-shell {
  width: 100vw;
  height: 100vh;
  background: none;
}

   .app-stage {
  position: relative;
  width: 100vw;  
  height: 100vh;
  aspect-ratio: auto; 
  background: transparent;
  box-shadow: none;
}

    .map-video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      user-select: none;
      -webkit-user-drag: none;
      pointer-events: none;
      z-index: 0;
    }

    .video-dim {
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.12);
      z-index: 1;
      pointer-events: none;
    }

    .ui-layer {
      position: relative;
      width: 100%;
      height: 100%;
      z-index: 10;
    }

 .map-area {
  position: absolute;
  left: 50%;
  top: 52%;
  width: min(86%, 92vh);
  aspect-ratio: 1440 / 1440;
  transform: translate(-50%, -50%);
  z-index: 12;
}

  .map-bg {
  width: 100%;
  height: 100%;
  object-fit: contain; 
}

    .svg-overlay {
      position: absolute;
      inset: 0;
      aspect-ratio: 1440 / 1440;
      aspect-ratio: 1440 / 1440;
      transform: translate(9.5%, -13%);
      width: 50%;
      height: 50%;
      z-index: 2;
    }

   .gyeongbuk-map {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  overflow: visible;
  z-index: 2;
  pointer-events: none;
}

.gyeongbuk-map .clickable-region,
.gyeongbuk-map path.clickable-region,
.gyeongbuk-map polygon.clickable-region,
.gyeongbuk-map rect.clickable-region,
.gyeongbuk-map circle.clickable-region {
  cursor: pointer;
  pointer-events: visiblePainted;
  fill: rgba(255, 255, 255, 0.001) !important;
  stroke: rgba(255, 255, 255, 0.72) !important;
  stroke-width: 2.2 !important;
  vector-effect: non-scaling-stroke;
  transition: fill 0.18s ease, filter 0.18s ease, opacity 0.18s ease;
}

.gyeongbuk-map .clickable-region:hover,
.gyeongbuk-map path.clickable-region:hover,
.gyeongbuk-map polygon.clickable-region:hover,
.gyeongbuk-map rect.clickable-region:hover,
.gyeongbuk-map circle.clickable-region:hover,
.gyeongbuk-map .clickable-region.is-active,
.gyeongbuk-map path.clickable-region.is-active,
.gyeongbuk-map polygon.clickable-region.is-active,
.gyeongbuk-map rect.clickable-region.is-active,
.gyeongbuk-map circle.clickable-region.is-active {
  fill: rgba(255, 193, 7, 0.38) !important;
  filter: drop-shadow(0 0 6px rgba(255, 193, 7, 0.8));
}

    .region-label {
      position: fixed;
      z-index: 30;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.96);
      color: #222;
      font-size: 14px;
      font-weight: 700;
      pointer-events: none;
      transform: translate(-50%, calc(-100% - 12px));
      white-space: nowrap;
      display: none;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.15);
    }


    .base-video { z-index: 0; }
    .overlay-container {
      position: absolute;
      top: -8%;
      left: 50%;
      transform: translateX(-50%);
      width: 55%;
      height: 45%;
      z-index: 15;
      pointer-events: none;
    }
    .overlay-video-canvas { width: 100%; height: 100%; display: block; }




.page-title {
  position: absolute;
  top: 100px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 55;
  margin: 0;
  font-size: 66px;
  font-weight: 900;
  color: #111;
  letter-spacing: -2px;
  text-shadow:

     0px  4px 10px rgba(0,0,0,0.18);
  white-space: nowrap;
  pointer-events: none;
}
.back-btn {
  position: absolute;
  top: 24px;
  left: 24px;
  z-index: 100;
  width: 44px;
  height: 44px;
  border-radius: 50%;
  background: rgba(255, 255, 255, 0.2);
  backdrop-filter: blur(8px); 
  -webkit-backdrop-filter: blur(8px);
  border: 1px solid rgba(255, 255, 255, 0.3);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: all 0.2s ease;
  box-shadow: 0 4px 15px rgba(0,0,0,0.2);
}

.back-btn:hover {
  background: rgba(255, 255, 255, 0.3);
  transform: translateY(-2px);
}

.back-btn:active {
  transform: scale(0.9);
}

.hint {
  position: absolute;

  border-radius: 999px;
  box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
  z-index: 50;
  white-space: nowrap;
  letter-spacing: -0.5px;
}

<div class="region-label" id="regionLabel"></div>
<script>
  const label = document.getElementById('regionLabel');
  const svgMap = document.querySelector('.gyeongbuk-map');
const regionFiles = {
  "동부동": [
    { name: "조교동", file: "youngcheon_dongbu_jogyo.html" },
    { name: "망정동", file: "youngcheon_dongbu_mangjeong.html" },
    { name: "야사동", file: "youngcheon_dongbu_yasa.html" },
    { name: "언하동", file: "youngcheon_dongbu_eonha.html" },
    { name: "신기동", file: "youngcheon_dongbu_singi.html" }
  ],
  "중앙동": [
    { name: "문외동", file: "youngcheon_jungang_muneo.html" },
    { name: "문내동", file: "youngcheon_jungang_munnae" },
    { name: "창구동", file: "youngcheon_jungang_changgu.html" },
    { name: "과전동", file: "youngcheon_jungang_gwajeon.html" },
    { name: "오미동", file: "youngcheon_jungang_omi.html" },
    { name: "녹전동", file: "youngcheon_jungang_nokjeon.html" },
    { name: "도림동", file: "youngcheon_jungang_dorim.html" },
    { name: "매산동", file: "youngcheon_jungang_maesan.html" }
  ],
  "서부동": [
    { name: "교촌동", file: "youngcheon_seobu_gyochon.html" },
    { name: "성내동", file: "youngcheon_seobu_seongnae.html" },
    { name: "화룡동", file: "youngcheon_seobu_hwaryong.html" },
    { name: "오수동", file: "youngcheon_seobu_osu.html" },
    { name: "쌍계동", file: "youngcheon_seobu_ssanggae.html" },
    { name: "대전동", file: "youngcheon_seobu_daejeon.html" },
    { name: "서산동", file: "youngcheon_seobu_seosan.html" }
  ],
  "완산동": [
    { name: "완산동", file: "youngcheon_whansan_whansan.html" }
  ],
 
  "남부동": [
    { name: "도동", file: "youngcheon_nambu_do.html" },
    { name: "금노동", file: "youngcheon_nambu_geumno.html" },
    { name: "범어동", file: "youngcheon_nambu_beomeo.html" },
    { name: "작산동", file: "youngcheon_nambu_jaksan.html" },
    { name: "봉동", file: "youngcheon_nambu_bong.html" },
    { name: "도남동", file: "youngcheon_nambu_donam.html" },
    { name: "본촌동", file: "youngcheon_nambu_bonchon.html" },
    { name: "채신동", file: "youngcheon_nambu_chaesin.html" },
    { name: "괴연동", file: "youngcheon_nambu_geoyeon.html" }
  ]
};
  function getRegionName(el) {
    if (!el) return '';
    return el.dataset.name || el.dataset.region || '';
  }

  function showLabel(text, x, y) {
    if (!label || !text) return;
    label.textContent = text;
    label.style.left = x + 'px';
    label.style.top = y + 'px';
    label.style.display = 'block';
  }

  function hideLabel() {
    if (!label) return;
    label.style.display = 'none';
  }

  function clearActive() {
    document.querySelectorAll('.clickable-region.is-active').forEach(el => {
      el.classList.remove('is-active');
    });
  }
function selectRegion(regionEl) {
  const adminName = getRegionName(regionEl);
  if (!adminName) return;

  clearActive();
  regionEl.classList.add('is-active');

  const selector = document.getElementById('legal-dong-selector');
  const btnContainer = document.getElementById('legal-dong-buttons');
  const nameDisplay = document.getElementById('admin-name-display');

  if (regionFiles[adminName]) {
    nameDisplay.textContent = adminName;
    btnContainer.innerHTML = ''; 

    regionFiles[adminName].forEach(dong => {
      const btn = document.createElement('button');
      btn.innerText = dong.name;
      const normalStyle = `
    padding: 15px 25px;
    border-radius: 18px;
      border: none;
      color: #fff;
      background: linear-gradient(180deg, #6db785 0%, #3f8f5b 100%);
    font-weight: bold;
    font-size: 16px;
    cursor: pointer;
    transition: all 0.2s ease;
    transform: translateY(0);
  `;

  const pressedStyle = `
    transform: translateY(3px);
    box-shadow: 0 2px 4px rgba(67, 233, 123, 0.4);
  `;

  btn.style.cssText = normalStyle;

  btn.onmousedown = () => {
    Object.assign(btn.style, { transform: "translateY(3px)", boxShadow: "0 2px 4px rgba(67, 233, 123, 0.4)" });
  };

  const restoreBtn = () => {
    btn.style.transform = "translateY(0)";
    btn.style.boxShadow = "0 6px 12px rgba(67, 233, 123, 0.3)";
  };

  btn.onmouseup = restoreBtn;
  btn.onmouseleave = restoreBtn; 
  btn.onclick = () => {
    location.href = dong.file; 
  };
  
  btnContainer.appendChild(btn);
});

    selector.style.display = 'block';
  } else {
    alert(adminName + " 페이지는 준비 중입니다! 🚧");
  }
}

  if (svgMap) {
    svgMap.addEventListener('mousemove', (e) => {
      const region = e.target.closest('.clickable-region');
      if (!region || !svgMap.contains(region)) {
        hideLabel();
        return;
      }
      showLabel(getRegionName(region), e.clientX, e.clientY);
    });

    svgMap.addEventListener('mouseleave', hideLabel);

    svgMap.addEventListener('touchstart', (e) => {
      const region = e.target.closest('.clickable-region');
      if (!region || !svgMap.contains(region)) return;

      const touch = e.touches[0];
      if (touch) {
        showLabel(getRegionName(region), touch.clientX, touch.clientY);
      }
    }, { passive: true });

    svgMap.addEventListener('touchend', () => {
      setTimeout(hideLabel, 500);
    }, { passive: true });

    svgMap.addEventListener('click', (e) => {
      const region = e.target.closest('.clickable-region');
      if (!region || !svgMap.contains(region)) return;
      selectRegion(region);
    });
  }
  const backBtn = document.getElementById('backBtn');

if (backBtn) {
  backBtn.addEventListener('click', () => {
    history.back();
  });
}
</script>

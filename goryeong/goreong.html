<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>고령군 상세지도</title>
  <style>
    * { box-sizing: border-box; }

   html, body {
  margin: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: #000; 
}

   .app-shell {
  width: 100vw;
  height: 100vh;
  background: none;
}

   .app-stage {
  position: relative;
  width: 100vw;  
  height: 100vh;
  aspect-ratio: auto; 
  background: transparent;
  box-shadow: none;
}

    .map-video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      user-select: none;
      -webkit-user-drag: none;
      pointer-events: none;
      z-index: 0;
    }

    .video-dim {
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.12);
      z-index: 1;
      pointer-events: none;
    }

    .ui-layer {
      position: relative;
      width: 100%;
      height: 100%;
      z-index: 10;
    }

 .map-area {
  position: absolute;
  left: 50%;
  top: 52%;
  width: min(86%, 92vh);
  aspect-ratio: 1440 / 1440;
  transform: translate(-50%, -50%);
  z-index: 12;
}

  .map-bg {
  width: 100%;
  height: 100%;
  object-fit: contain; 
}

    .svg-overlay {
      position: absolute;
      inset: 0;
      aspect-ratio: 1440 / 1440;
      aspect-ratio: 1440 / 1440;
      transform: translate(-9.5%, -0.3%);
      width: 50%;
      height: 50%;
      z-index: 2;
    }

   .gyeongbuk-map {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  overflow: visible;
  z-index: 2;
  pointer-events: none;
}

.gyeongbuk-map .clickable-region,
.gyeongbuk-map path.clickable-region,
.gyeongbuk-map polygon.clickable-region,
.gyeongbuk-map rect.clickable-region,
.gyeongbuk-map circle.clickable-region {
  cursor: pointer;
  pointer-events: visiblePainted;
  fill: rgba(255, 255, 255, 0.001) !important;
  stroke: rgba(255, 255, 255, 0.72) !important;
  stroke-width: 2.2 !important;
  vector-effect: non-scaling-stroke;
  transition: fill 0.18s ease, filter 0.18s ease, opacity 0.18s ease;
}

.gyeongbuk-map .clickable-region:hover,
.gyeongbuk-map path.clickable-region:hover,
.gyeongbuk-map polygon.clickable-region:hover,
.gyeongbuk-map rect.clickable-region:hover,
.gyeongbuk-map circle.clickable-region:hover,
.gyeongbuk-map .clickable-region.is-active,
.gyeongbuk-map path.clickable-region.is-active,
.gyeongbuk-map polygon.clickable-region.is-active,
.gyeongbuk-map rect.clickable-region.is-active,
.gyeongbuk-map circle.clickable-region.is-active {
  fill: rgba(255, 193, 7, 0.38) !important;
  filter: drop-shadow(0 0 6px rgba(255, 193, 7, 0.8));
}

    .region-label {
      position: fixed;
      z-index: 30;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.96);
      color: #222;
      font-size: 14px;
      font-weight: 700;
      pointer-events: none;
      transform: translate(-50%, calc(-100% - 12px));
      white-space: nowrap;
      display: none;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.15);
    }


    .base-video { z-index: 0; }
    .overlay-container {
      position: absolute;
      top: -8%;
      left: 50%;
      transform: translateX(-50%);
      width: 55%;
      height: 45%;
      z-index: 15;
      pointer-events: none;
    }
    .overlay-video-canvas { width: 100%; height: 100%; display: block; }




.page-title {
  position: absolute;
  top: 100px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 55;
  margin: 0;
  font-size: 66px;
  font-weight: 900;
  color: #111;
  letter-spacing: -2px;
  text-shadow:
    -2px -2px 0 #fff,
     2px -2px 0 #fff,
    -2px  2px 0 #fff,
     2px  2px 0 #fff,
     0px  4px 10px rgba(0,0,0,0.18);
  white-space: nowrap;
  pointer-events: none;
}
.back-btn {
  position: absolute;
  top: 24px;
  left: 24px;
  z-index: 100;
  width: 44px;
  height: 44px;
  border-radius: 50%;
  background: rgba(255, 255, 255, 0.2);
  backdrop-filter: blur(8px); 
  -webkit-backdrop-filter: blur(8px);
  border: 1px solid rgba(255, 255, 255, 0.3);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: all 0.2s ease;
  box-shadow: 0 4px 15px rgba(0,0,0,0.2);
}

.back-btn:hover {
  background: rgba(255, 255, 255, 0.3);
  transform: translateY(-2px);
}

.back-btn:active {
  transform: scale(0.9);
}

.hint {
  position: absolute;
  left: 50%;
  bottom: 60px; 
  transform: translateX(-50%);
  padding: 12px 28px;
  font-size: 30px;
  font-weight: 700;
  color: white; 
  background: rgba(0, 0, 0, 0.5);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  border: 1px solid rgba(255, 255, 255, 0.2);
  border-radius: 999px;
  box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
  z-index: 50;
  white-space: nowrap;
  letter-spacing: -0.5px;
}

  </style>

  <div class="region-label" id="regionLabel"></div>

  <script>
  const label = document.getElementById('regionLabel');
  const svgMap = document.querySelector('.gyeongbuk-map');
const regionFiles = {
  "대가야읍": "goreong_daegayaeop.html",
  "다산면": "goreong_dasanmeon.html", 
  "덕곡면": "goreong_deokgokmeon.html",
  "개진면": "goreong_gaejinmeon.html",
  "성산면": "goreong_seongsanmeon.html",
  "쌍림면": "goreong_ssanglimmeon.html",
  "우곡면": "goreong_ugokmeon.html",
  "운수면": "goreong_unsumeon.html"
  };
  function getRegionName(el) {
    if (!el) return '';
    return el.dataset.name || el.dataset.region || '';
  }

  function showLabel(text, x, y) {
    if (!label || !text) return;
    label.textContent = text;
    label.style.left = x + 'px';
    label.style.top = y + 'px';
    label.style.display = 'block';
  }

  function hideLabel() {
    if (!label) return;
    label.style.display = 'none';
  }

  function clearActive() {
    document.querySelectorAll('.clickable-region.is-active').forEach(el => {
      el.classList.remove('is-active');
    });
  }
function selectRegion(regionEl) {
  const name = getRegionName(regionEl);
  if (!name) return;

  clearActive();
  regionEl.classList.add('is-active');

  setTimeout(() => {
    clearActive();
    
    const targetFile = regionFiles[name];
    if (targetFile) {
      location.href = targetFile;
    } else {
      alert(name + " 페이지는 아직 준비 중입니다! 🚧");
    }
  }, 120);
}

  if (svgMap) {
    svgMap.addEventListener('mousemove', (e) => {
      const region = e.target.closest('.clickable-region');
      if (!region || !svgMap.contains(region)) {
        hideLabel();
        return;
      }
      showLabel(getRegionName(region), e.clientX, e.clientY);
    });

    svgMap.addEventListener('mouseleave', hideLabel);

    svgMap.addEventListener('touchstart', (e) => {
      const region = e.target.closest('.clickable-region');
      if (!region || !svgMap.contains(region)) return;

      const touch = e.touches[0];
      if (touch) {
        showLabel(getRegionName(region), touch.clientX, touch.clientY);
      }
    }, { passive: true });

    svgMap.addEventListener('touchend', () => {
      setTimeout(hideLabel, 500);
    }, { passive: true });

    svgMap.addEventListener('click', (e) => {
      const region = e.target.closest('.clickable-region');
      if (!region || !svgMap.contains(region)) return;
      selectRegion(region);
    });
  }
  const backBtn = document.getElementById('backBtn');

if (backBtn) {
  backBtn.addEventListener('click', () => {
    history.back();
  });
}
</script>
<script src="/sound.js"></script>

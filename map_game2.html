<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>경북 기억력 게임</title>
 <style>
  * { box-sizing: border-box; }
    html, body { margin: 0; width: 100%; height: 100%; overflow: hidden; font-family: Arial, sans-serif; }

  .map-video {
      position: fixed;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      object-fit: cover;
      z-index: -1;
    }
    .video-dim {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.12); 
      z-index: 0;
    }
  .map-wrap {
  position: absolute;
  left: 50%;
  top: 50%;
  transform: translate(-50%, -50%);
  width: min(90vw, 84vh);
  aspect-ratio: 2048 / 1855;
  z-index: 10;
}


.map-area {
  position: absolute;
  left: 50%;
  top: 52%;
  width: min(95%, 95vh);
  height: 100%;
  aspect-ratio: 1440 / 1440;
  transform: translate(-50%, -50%);
  z-index: 12;
}
   .map-bg {
  position: absolute;
  inset: 0;
  width: 98.5%;
  height: 97.5%;
  object-fit: contain;
  transform: translateX(1.5px) translateY(1px) scale(1.14);
  transform-origin: center center;
}

    .svg-overlay {
  position: absolute;
  left: 5.2%;
  top: 9.5%;
  width: 100%;
  height: 100%;
  transform: translate(-6.8%, -8.3%) 
}

    .gyeongbuk-map {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      overflow: visible;
      z-index: 2;
    }

    .gyeongbuk-map .clickable-region {
      cursor: pointer;
    }

    .gyeongbuk-map .clickable-region path,
.gyeongbuk-map path.clickable-region {
  fill: rgba(255, 255, 255, 0.01); 
  stroke: rgba(255, 255, 255, 0.72);
  stroke-width: 2.2;
  vector-effect: non-scaling-stroke;
  transition: fill 0.18s ease, filter 0.18s ease, opacity 0.18s ease;
}

    .gyeongbuk-map .clickable-region:hover path,
    .gyeongbuk-map path.clickable-region:hover,
    .gyeongbuk-map .clickable-region.is-active path,
    .gyeongbuk-map path.clickable-region.is-active {
      fill: rgba(255, 193, 7, 0.38);
      filter: drop-shadow(0 0 6px rgba(255, 193, 7, 0.8));
    }

    .region-label {
      position: fixed;
      z-index: 30;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.96);
      color: #222;
      font-size: 14px;
      font-weight: 700;
      pointer-events: none;
      transform: translate(-50%, calc(-100% - 12px));
      white-space: nowrap;
      display: none;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.15);
    }

.highlight {
  fill: rgba(255, 255, 0, 0.8) !important; 
  filter: drop-shadow(0 0 10px rgba(255, 255, 0, 1)) !important;
  opacity: 1 !important;
}
.hint {
  position: absolute;
  left: 50%;
  bottom: 10%; 
  transform: translateX(-50%);
  padding: 10px 20px;
  color: white; 
  font-size: 40px; 
  font-weight: bold;
  background: rgba(0, 0, 0, 0.5);
  border-radius: 20px;
  white-space: nowrap; 
  z-index: 50; 
}

    .menu-card { width: min(90vw, 38rem); padding: 2rem; border-radius: 1.5rem; background: rgba(248, 255, 250, 0.9); box-shadow: 0 1rem 2rem rgba(34, 94, 54, 0.15); backdrop-filter: blur(10px); }
    .menu-title { font-size: 2rem; font-weight: 900; color: #2f4f38; margin-bottom: 1.5rem; }
    .menu-btn { width: 100%; height: 3.5rem; border-radius: 0.8rem; border: none; color: #fff; font-weight: 700; font-size: 1.1rem; margin-bottom: 0.5rem; cursor: pointer; background: linear-gradient(180deg, #6db785 0%, #3f8f5b 100%); }
    .logout-btn { width: 100%; height: 3.5rem; border-radius: 0.8rem; font-weight: 700; font-size: 1.1rem; margin-bottom: 0.5rem; cursor: pointer; color: #3f8f5b; border: 0.12rem solid #9fd3ad; background: rgba(255, 255, 255, 0.95); }

    
  #cover {
  position: fixed; 
  top: 0; left: 0;
  width: 100vw; height: 100vh;
  background: rgba(0, 0, 0, 0.6);
  z-index: 9999; 
  display: flex;
  justify-content: center;
  align-items: center;
}
.menu-wrap {
  display: flex;
 flex-direction: row;      
  justify-content: center;  
  align-items: center;
  gap: 10px;
  width: 100%;
}

#cover button {
  width: 200px; height: 80px;
  font-size: 1.5rem;
  cursor: pointer;
}

button { 
    padding: 12px; cursor: pointer; border: none; border-radius: 8px;
    background: #e0e0e0; transition: transform 0.1s, background 0.2s;
  }

  button:active { transform: scale(0.98);}
  .menu-title { 
  text-align: center; 
  font-size: 1.3rem; 
  font-weight: 800; 
  color: #2f4f38; 
  margin-bottom: 1rem; }

  .ui-container {
  position: fixed; top: 20px; width: 100%; display: flex; 
  justify-content: space-between; padding: 0 20px; z-index: 100;
}
.ui-box {
  padding: 15px 30px; 
  border-radius: 20px; 
  background: rgba(255, 255, 255, 0.9); 
  color: #2f4f38;
  font-weight: 900;
  font-size: 2.5rem; 
  box-shadow: 0 6px 10px rgba(0,0,0,0.2);
}
  </style>
</head>

   let sequence = [];
  let playerGuess = [];
  let currentLevel = 2;
  let isPlaying = false;
  let timerInterval;
const TIME_LIMIT = 10;
let timeLeft = TIME_LIMIT;

  const regionIds = ['andong', 'bonghwa', 'chilgok', 'chungdo', 'chungsong', 'gimcheon', 'goryeong', 'gumi', 'gyeongju', 'gyeongsan', 'mungyeong', 'pohang', 'sangju', 'seongju', 'uiseong', 'uljin', 'ulleong', 'yecheon', 'youngcheon', 'youngduk', 'youngju', 'youngyang'];

  async function blinkRegion(id) {
    const el = document.getElementById(id);
    if (!el) return;
    el.classList.add('highlight');
    await new Promise(r => setTimeout(r, 600));
    el.classList.remove('highlight');
  }

function hideCover() {
  document.getElementById('cover').style.display = 'none';
  startGame();
}

async function startGame() {
  sequence = [];
  currentLevel = 2;
  for (let i = 0; i < currentLevel; i++) {
    sequence.push(regionIds[Math.floor(Math.random() * regionIds.length)]);
  }
  document.getElementById("level-display").innerText = "단계: 1";
  startRound();
}
async function startRound() {
  isPlaying = false;
  playerGuess = [];
  
  const currentStep = sequence.length - 1; 
  document.getElementById("status").innerText = currentStep + "단계 문제 진행 중... 순서를 기억하세요!";
  
  for(let id of sequence) {
    await blinkRegion(id);
    await new Promise(r => setTimeout(r, 600));
  }
  
  isPlaying = true;
  document.getElementById("status").innerText = currentStep + "단계! 순서를 기억해서 클릭하세요!";
  resetTimer();
}

window.handleRegionClick = async (id) => {
  if (!isPlaying) return;
  
  const el = document.getElementById(id);
  el.classList.add('highlight');
  setTimeout(() => el.classList.remove('highlight'), 200);

  playerGuess.push(id);
  const currentIndex = playerGuess.length - 1;


  if (playerGuess[currentIndex] !== sequence[currentIndex]) {
    console.log("오답 클릭 - 게임 오버 실행");
    handleGameOver(); 
    window.playGameSound('wrong'); 
    
    return;
  }

  if (playerGuess.length === sequence.length) {
    clearInterval(timerInterval);
    document.getElementById("status").innerText = "성공!";
     window.playGameSound('correct');
    
    currentLevel++; 
    document.getElementById("level-display").innerText = "단계: " + (currentLevel - 1);
    
    sequence.push(regionIds[Math.floor(Math.random() * regionIds.length)]);
    setTimeout(() => { startRound(); }, 1000);
  } else {
    resetTimer();
  }
};

function showHelp() {
  document.getElementById('helpModal').style.display = 'flex';
}
function resetTimer() {
  clearInterval(timerInterval);
  timeLeft = TIME_LIMIT;
  document.getElementById("timer-display").innerText = "시간: " + timeLeft + "초";
  
  timerInterval = setInterval(() => {
    timeLeft--;
    document.getElementById("timer-display").innerText = "시간: " + timeLeft + "초";
    if (timeLeft <= 0) {
      clearInterval(timerInterval);
      window.handleGameOver(); 
      window.playGameSound('wrong'); 
    }
  }, 1000);
}
async function handleGameOver() {
  
  clearInterval(timerInterval);
  isPlaying = false;
  const finalScore = (sequence.length - 2); 
  
  document.getElementById('final-score').innerText = finalScore + "점";
  
  const resultModal = document.getElementById('resultModal');
  const resultList = document.getElementById('result-ranking-list');
  resultModal.style.display = 'flex';
  resultList.innerHTML = "저장 및 랭킹 불러오는 중...";

  const user = auth.currentUser;
 try {
    if (user) {
      let playerName = "익명";
      let playerClass = "미지정";

      const userDoc = await db.collection("users").doc(user.uid).get();
      
      if (userDoc.exists) {
        const userData = userDoc.data();
        playerName = userData.name || "익명";
      
        playerClass = userData.classCode || "미지정"; 
      } else {
        console.warn("UID와 일치하는 문서가 없습니다:", user.uid);
      }
      
      await db.collection("rankings_memory").add({
        name: playerName,
        class_code: playerClass, 
        score: finalScore,
        timestamp: firebase.firestore.FieldValue.serverTimestamp()
      });
      console.log("저장 성공! 이름:", playerName, "소속:", playerClass);
    }
   
  const snapshot = await db.collection("rankings_memory")
                           .orderBy("score", "desc")
                           .orderBy("timestamp", "desc")
                           .limit(5)
                           .get();

    if (snapshot.empty) {
      resultList.innerHTML = "아직 기록이 없습니다.";
    } else {
      let html = `<table style="width:100%; border-collapse:collapse; color:#2f4f38; font-size: 1.5rem; text-align: center;">
                  <tr style="border-bottom:2px solid #ccc;">
                    <th style="padding: 8px;">순위</th>
                    <th style="padding: 8px;">이름</th>
                    <th style="padding: 8px;">소속</th>
                    <th style="padding: 8px;">점수</th>
                  </tr>`;
      let count = 1;
      snapshot.forEach((doc) => {
        let data = doc.data();
        let className = data.class_code || data.classCode || "미지정";
        let name = data.name || "익명";
        let score = data.score || 0;
        
        let medal = count === 1 ? "🥇" : count === 2 ? "🥈" : count === 3 ? "🥉" : count + "위";

        html += `<tr style="border-bottom:1px solid #eee;">
                   <td style="padding:6px;">${medal}</td>
                   <td style="padding:6px;">${name}</td>
                   <td style="padding:6px;">${className}</td>
                   <td style="padding:6px;">${score}점</td>
                 </tr>`;
        count++;
      });
      html += `</table>`;
      resultList.innerHTML = html;
    }
  } catch (error) {
    console.error("오류 발생:", error);
    resultList.innerHTML = "에러: " + error.message; 
  }
}

window.showRanking = function() {
  const user = auth.currentUser;  
  if (!user) { alert("로그인이 필요합니다."); return; }
  
  const modal = document.getElementById('rankingModal');
  const list = document.getElementById('ranking-list');
  modal.style.display = 'flex';
  list.innerHTML = "데이터 불러오는 중...";

  db.collection("rankings_memory")
    .orderBy("score", "desc")
    .orderBy("timestamp", "desc")
    .limit(5)
    .get()
    .then((snapshot) => {
      if (snapshot.empty) {
        list.innerHTML = "아직 기록이 없습니다.";
      } else {
        let html = `<table style="width:100%; border-collapse:collapse; color:#2f4f38; font-size: 1.5rem; text-align: center;">
                  <tr style="border-bottom:2px solid #ccc;">
                    <th style="padding: 8px;">순위</th>
                    <th style="padding: 8px;">이름</th>
                    <th style="padding: 8px;">소속</th>
                    <th style="padding: 8px;">점수</th>
                  </tr>`;
        let count = 1;
        snapshot.forEach((doc) => {
          let data = doc.data();
          let className = data.class_code || data.classCode || "미지정"; 
          let name = data.name || "익명";
          let score = data.score || 0;
          
          let medal = count === 1 ? "🥇" : count === 2 ? "🥈" : count === 3 ? "🥉" : count + "위";

          html += `<tr style="border-bottom:1px solid #eee;">
                     <td style="padding:6px;">${medal}</td>
                     <td style="padding:6px;">${name}</td>
                     <td style="padding:6px;">${className}</td>
                     <td style="padding:6px;">${score}점</td>
                   </tr>`;
          count++;
        });
        html += `</table>`;
        list.innerHTML = html;
      }
    })
    .catch((error) => {
      list.innerHTML = "불러오기 실패";
      console.error(error);
    });
};

  <title>경북 여행 화면</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: none;
    }

    .app {
      position: relative;
      width: 100vw;
      height: 100dvh;
      overflow: hidden;
    }

    .bg-video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 0;
    }

    .ui {
      position: absolute;
      inset: 0;
      z-index: 2;
      display: flex;
      justify-content: center;
      align-items: flex-end;
      padding-left: 5vw;
      padding-right: 5vw;
      padding-bottom: calc(env(safe-area-inset-bottom) + 24vh);
    }

    .menu-card {
      width: min(102vw, 38rem);
      padding: clamp(2.1rem, 4.8vw, 2.6rem);
      border-radius: clamp(1.1rem, 3vw, 1.6rem);
      background: rgba(248, 255, 250, 0.86);
      box-shadow: 0 0.9rem 2rem rgba(34, 94, 54, 0.18);
      backdrop-filter: blur(0.35rem);
    }

    .menu-wrap {
      display: flex;
      flex-direction: column;
      gap: clamp(0.7rem, 2.5vw, 0.95rem);
    }

    .menu-btn {
      width: 100%;
      height: clamp(4.8rem, 8.8vw, 5.2rem);
      border-radius: clamp(0.85rem, 2.4vw, 1rem);
      font-size: clamp(1.05rem, 2.8vw, 1.2rem);
      font-weight: 800;
      cursor: pointer;
      transition: transform 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
    }

    .menu-btn:active{
      transform: scale(0.98);
    }

    .menu-btn {
      border: none;
      color: #fff;
      background: linear-gradient(180deg, #6db785 0%, #3f8f5b 100%);
      box-shadow: 0 0.7rem 1.2rem rgba(63, 143, 91, 0.24);
    }

    .menu-title {
  text-align: center;
  font-size: clamp(1.2rem, 3vw, 1.5rem);
  font-weight: 800;
  color: #2f4f38;
  margin-bottom: 1rem;
}

    .back-btn {
      position: absolute;
      top: 24px;
      left: 24px;
      z-index: 100;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.2);
      backdrop-filter: blur(8px); 
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    }
    .back-btn:hover {
      background: rgba(255, 255, 255, 0.3);
      transform: translateY(-2px);
    }
    .back-btn:active {
      transform: scale(0.9);
    }
    
    .map-controls {
  position: absolute;
  top: 24px;
  right: 24px; 
  z-index: 9999;
  display: flex;
  gap: 10px;
  pointer-events: auto; 
}

.nav-btn {
  padding: 12px 20px;
  border-radius: 24px;
  border: 1px solid rgba(255, 255, 255, 0.8); 
  background: rgba(0, 0, 0, 0.5); 
  color: white; 
  font-weight: 700;
  cursor: pointer;
}

.nav-btn {
  padding: 12px 20px;
  border-radius: 24px;
  border: 1px solid rgba(255, 255, 255, 0.3); 
  background: rgba(255, 255, 255, 0.2);       
  backdrop-filter: blur(8px);               
  -webkit-backdrop-filter: blur(8px);
  color: #2f4f38;                             
  font-weight: 700;
  cursor: pointer;
  transition: all 0.2s ease;
  box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
}

.nav-btn:hover {
  background: rgba(255, 255, 255, 0.4);
  transform: translateY(-2px);
}

.nav-btn:active {
  transform: scale(0.95);
}

.nav-btn.active {
  background: rgba(255, 255, 255, 0.2); 
  color: white;
  border: 1px solid rgba(255, 255, 255, 0.3);
}

button { 
    padding: 12px; cursor: pointer; border: none; border-radius: 8px;
    background: #e0e0e0; transition: transform 0.1s, background 0.2s;
  }

  button:active { transform: scale(0.98);}
  
.logout-btn { 
   width: 100%; 
  height: 3.5rem; 
  border-radius: 0.8rem; 
  font-weight: 700;
  font-size: 1.1rem; 
  margin-bottom: 0.5rem; 
  cursor: pointer;
  color: #3f8f5b;
  border: 0.12rem solid #9fd3ad;
  box-shadow: 0 0.45rem 1rem rgba(63, 143, 91, 0.08);
  background: rgba(255, 255, 255, 0.95);
  display: flex; 
  justify-content: center;
  align-items: center;
  }

  function startRandomRoulette() {
    const modal = document.getElementById('roulette-modal');
    const display = document.getElementById('roulette-display');
    
    modal.style.display = 'flex';
    
    let i = 0;
    const interval = setInterval(() => {
      const filePath = exploreFiles[i % exploreFiles.length];
      display.innerText = nameMap[filePath] || "탐험지";
      i++;
    }, 100);

    setTimeout(() => {
      clearInterval(interval);
      const randomIndex = Math.floor(Math.random() * exploreFiles.length);
      const finalPage = exploreFiles[randomIndex]; 
      
      display.innerText = (nameMap[finalPage] || "도착") + "!";
      
      setTimeout(() => {
        location.href = finalPage;
      }, 1000);
    }, 2000);
  }

  document.addEventListener('DOMContentLoaded', () => {
    const randomBtn = document.getElementById('randomBtn');
    if (randomBtn) {
      randomBtn.addEventListener('click', startRandomRoulette);
    }
  });
  window.addEventListener('pageshow', (event) => {
  const modal = document.getElementById('roulette-modal');
  if (modal) {
    modal.style.display = 'none';
  }
  const display = document.getElementById('roulette-display');
  if (display) {
    display.innerText = "준비중";
  }
});


  document.getElementById("menuCloseBtn").addEventListener("click", () => {
    document.getElementById("infoModal").style.display = "none";
  });

  window.addEventListener('load', () => {
    if (!localStorage.getItem('hasSeenModal')) {
      document.getElementById("infoModal").style.display = "flex";
      localStorage.setItem('hasSeenModal', 'true');
    }
  });
  const openModalBtn = document.getElementById("openModalBtn");
    if (openModalBtn) { 
      openModalBtn.addEventListener("click", () => {
        document.getElementById("infoModal").style.display = "flex";
      });
    }
</script>

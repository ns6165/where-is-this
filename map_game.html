 flex-direction: row;

let currentTarget = null, hintIdx = 0, boundaryLayer = null, startTime = null, timerInterval = null, score = 100, questionCount = 0;
let isSaved = false;

const map = L.map('map', { 
    dragging: true,          
    scrollWheelZoom: false,   
    touchZoom: false,         
    doubleClickZoom: false,  
    zoomControl: false,       
    maxBounds: gyeongbukBounds, 
    minZoom: 9 
}).setView([36.5, 128.5], 11);L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager_nolabels/{z}/{x}/{y}.png').addTo(map);

async function startGame() {
    score = 200; 
    questionCount++;
    
    hintIdx = 0;
    document.getElementById('hint-display').innerText = "여기에 힌트가 나타납니다.";
    
    currentTarget = gyeongbukRegions[Math.floor(Math.random() * gyeongbukRegions.length)];
    let shuffledHints = [...currentTarget.hints];
    for (let i = shuffledHints.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [shuffledHints[i], shuffledHints[j]] = [shuffledHints[j], shuffledHints[i]];
    }
    currentTarget.shuffledHints = shuffledHints;

    const response = await fetch(`data/${currentTarget.file}.geojson`);
    const geoData = await response.json();
    
    if(boundaryLayer) map.removeLayer(boundaryLayer);
    boundaryLayer = L.geoJSON(geoData, { style: { color: 'blue', weight: 3, fillOpacity: 0 } }).addTo(map);
    map.setView([currentTarget.lat, currentTarget.lng], 16);
    
    updateStatus();
    document.getElementById('answer').value = "";
    document.getElementById('answer').focus();
}
let lastZoomOutTime = 0; 

function startTimer() {
    if (timerInterval) clearInterval(timerInterval);
    startTime = Date.now();
    lastZoomOutTime = startTime; 
    
    timerInterval = setInterval(() => {
    const now = Date.now();
    const elapsed = (now - startTime) / 1000;
    document.getElementById('timer').innerText = elapsed.toFixed(1) + "초";

  
    if (elapsed > 0 && Math.floor(elapsed) % 1 === 0) {
        if (score > 0) {
            score -= 1; 
            updateStatus();
            checkGameOver();
        }
    }

    if (now - lastZoomOutTime >= 5000) { 
        autoZoomOut();
        lastZoomOutTime = now;
    }
}, 100);
}

function autoZoomOut() {
    let nextZoom = map.getZoom() - 1;
    if (nextZoom >= 9) {
        map.setZoom(nextZoom); 
    }
}

function checkGameOver() {
    if (score <= 0) {
        score = 0; 
        updateStatus(); 
        clearInterval(timerInterval); 
        window.playGameSound('gameOver');
         saveAndShowResult(0); 
        
        return true;
    }
    return false;
}

function zoomOut() {
    score -= 10;
    updateStatus();
    if (!checkGameOver()) {
        map.setZoom(map.getZoom() - 1);
    }
}
function showTextHint() {
    if (hintIdx < currentTarget.shuffledHints.length) {
        score -= 10; 
        updateStatus();
        document.getElementById('hint-display').innerText = "힌트: " + currentTarget.shuffledHints[hintIdx];
        hintIdx++;
        
        checkGameOver(); 
    } else {
        document.getElementById('hint-display').innerText = "더 이상 힌트가 없습니다.";
    }
}

function updateStatus() {
    document.getElementById('status').innerText = `문제 ${questionCount}번`;
    document.getElementById('score-board').innerText = `점수: ${score}점`;
    
}
function checkAnswer() {
    if(document.getElementById('answer').value === currentTarget.name) {
        clearInterval(timerInterval);
        score += 200;
        window.playGameSound('correct'); 
        
        if (questionCount >= 5) {
            saveAndShowResult(score); 
        } else {
            alert("정답입니다! 다음 문제로 넘어갑니다.");
            startGame();
            startTimer();
        }
    } else {
        window.playGameSound('wrong'); 
        alert("틀렸습니다. 다시 생각해보세요!");
    }
}

function hideCover() {
    document.getElementById('cover').style.display = 'none';
    startGame();
    startTimer();
}

document.getElementById('answer').addEventListener('keypress', (e) => { if(e.key === 'Enter') checkAnswer(); });

  document.getElementById('helpModal').style.display = 'flex';
}

window.saveScore = function(score) {
  const auth = firebase.auth();
  const user = auth.currentUser;

  if (!user) {
    console.log("로그인 정보 로딩 중... 500ms 대기");
    setTimeout(() => {
      const retryUser = auth.currentUser;
      if (retryUser) {
        performSave(retryUser, score);
      } else {
        alert("로그인 정보가 없습니다. 다시 로그인해주세요.");
      }
    }, 500);
  } else {
    performSave(user, score);
  }
};

function performSave(user, score) {
  db.collection("rankings").add({
    name: user.email.split('@')[0],
    score: score,
    uid: user.uid,
    timestamp: firebase.firestore.FieldValue.serverTimestamp()
  })
  .then(() => {
    alert("점수가 성공적으로 저장되었습니다!");
  })
  .catch((error) => {
    console.error("저장 실패:", error);
    alert("저장 중 에러 발생: " + error.message);
  });
}

  modal.style.display = 'flex';
  list.innerHTML = "데이터 불러오는 중...";
  title.innerText = "경북 지리 탐험 랭킹"; 

  db.collection("rankings")
    .orderBy("score", "desc")
    .orderBy("timestamp", "desc")
    .limit(5) 
    .get()
    .then((snapshot) => {
      if (snapshot.empty) {
        list.innerHTML = "아직 랭킹 정보가 없습니다.";
        return;
      }
      
      let html = `<table style="width:100%; border-collapse:collapse; color:#2f4f38; font-size: 1.5rem;">
                    <tr style="border-bottom:2px solid #ccc;">
                      <th>순위</th><th>이름</th><th>학교</th><th>점수</th>
                    </tr>`;
      let count = 1;
      
      snapshot.forEach((doc) => {
        let data = doc.data();
        let medal = count === 1 ? "🥇" : count === 2 ? "🥈" : count === 3 ? "🥉" : count + "위";
        let className = data.classCode || "알수없음";

        html += `<tr style="border-bottom:1px solid #eee;">
                   <td style="padding:8px;">${medal}</td>
                   <td style="padding:8px;">${data.name}</td>
                   <td style="padding:8px;">${className}</td>
                   <td style="padding:8px;">${data.score}점</td>
                 </tr>`;
        count++;
      });
      html += `</table>`;
      list.innerHTML = html;
    });
};
async function saveAndShowResult(score) {
  if (isSaved) return;
  isSaved = true;

  const user = firebase.auth().currentUser;
  if (!user) return;

  const userDoc = await db.collection("users").doc(user.uid).get();
  const userData = userDoc.data();
  const classCode = userData ? userData.classCode : "알수없음";

  await db.collection("rankings").add({
    name: user.email.split('@')[0],
    score: score,
    classCode: classCode,
    timestamp: firebase.firestore.FieldValue.serverTimestamp()
  });

  const snapshot = await db.collection("rankings")
                           .orderBy("score", "desc")
                           .limit(5)
                           .get();

  const snap = await db.collection("rankings").where("score", ">", score).get();
  const myRank = snap.size + 1;

  let rankingHtml = `<table style="width:100%; border-collapse:collapse; color:#2f4f38; font-size: 1.1rem;">
                      <tr style="border-bottom:2px solid #ccc;">
                        <th>순위</th><th>이름</th><th>소속</th><th>점수</th>
                      </tr>`;
  
  let count = 1;
  snapshot.forEach((doc) => {
    let data = doc.data();
    let medal = count === 1 ? "🥇" : count === 2 ? "🥈" : count === 3 ? "🥉" : count + "위";
    let className = data.classCode || "알수없음";
    rankingHtml += `<tr style="border-bottom:1px solid #eee;">
                      <td style="padding:8px;">${medal}</td>
                      <td style="padding:8px;">${data.name}</td>
                      <td style="padding:8px;">${className}</td>
                      <td style="padding:8px;">${data.score}점</td>
                    </tr>`;
    count++;
  });
  rankingHtml += `</table>`;

  document.getElementById('final-score').innerText = score + "점";
  document.getElementById('player-rank').innerHTML = 
    `<div style="font-size:1.3rem; margin-bottom:10px;">전체 순위: <b>${myRank}등</b></div>` +
    rankingHtml; 
      
  document.getElementById('resultModal').style.display = "flex";
}

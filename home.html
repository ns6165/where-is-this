<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>홈 화면</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: none;
    }

    .app {
      position: relative;
      width: 100vw;
      height: 100dvh;
      overflow: hidden;
    }

    .bg-video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 0;
    }

    .ui {
      position: absolute;
      inset: 0;
      z-index: 2;
      display: flex;
      justify-content: center;
      align-items: flex-end;
      padding-left: 5vw;
      padding-right: 5vw;
      padding-bottom: calc(env(safe-area-inset-bottom) + 16vh);
    }

    .menu-card {
      width: min(102vw, 38rem);
      padding: clamp(2.1rem, 4.8vw, 2.6rem);
      border-radius: clamp(1.1rem, 3vw, 1.6rem);
      background: rgba(248, 255, 250, 0.86);
      box-shadow: 0 0.9rem 2rem rgba(34, 94, 54, 0.18);
      backdrop-filter: blur(0.35rem);
    }

    .menu-wrap {
      display: flex;
      flex-direction: column;
      gap: clamp(0.7rem, 2.5vw, 0.95rem);
    }

    .menu-btn,
    .logout-btn {
      width: 100%;
      height: clamp(4.8rem, 8.8vw, 5.2rem);
      border-radius: clamp(0.85rem, 2.4vw, 1rem);
      font-size: clamp(1.05rem, 2.8vw, 1.2rem);
      font-weight: 800;
      cursor: pointer;
      transition: transform 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
    }

    .menu-btn:active,
    .logout-btn:active {
      transform: scale(0.98);
    }

    .menu-btn {
      border: none;
      color: #fff;
      background: linear-gradient(180deg, #6db785 0%, #3f8f5b 100%);
      box-shadow: 0 0.7rem 1.2rem rgba(63, 143, 91, 0.24);
    }

    .logout-btn {
      margin-top: 0.3rem;
      border: 0.12rem solid #9fd3ad;
      color: #3f8f5b;
      background: rgba(255, 255, 255, 0.95);
      box-shadow: 0 0.45rem 1rem rgba(63, 143, 91, 0.08);
    }
    .menu-title {
  text-align: center;
  font-size: clamp(1.2rem, 3vw, 1.5rem);
  font-weight: 800;
  color: #2f4f38;
  margin-bottom: 1rem;
}
.toast-msg {
  position: fixed;
  top: 20px;
  left: 50%;
  transform: translateX(-50%) translateY(-20px);
  background: rgba(63, 143, 91, 0.95);
  color: white;
  padding: 12px 25px;
  border-radius: 50px;
  font-weight: bold;
  box-shadow: 0 4px 15px rgba(0,0,0,0.2);
  z-index: 9999;
  opacity: 0;
  transition: all 0.4s ease;
}
.toast-msg.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}
  </style>
</head>
<body>
  <div class="app">
    <video class="bg-video" autoplay muted loop playsinline>
      <source src="video/main.mp4" type="video/mp4" />
    </video>

    <div class="ui">
      <div class="menu-card">
         <div class="menu-title">메인 메뉴</div>
  <div class="menu-wrap">
    <button class="menu-btn" id="infoBtn">지역 알아보기</button>
    <button class="menu-btn" id="foodBtn">음식 알아보기</button>
    <button class="menu-btn" id="testBtn">경북 탐구하기</button>
    <button class="menu-btn" id="diaryBtn">나의 지역 일기장</button>
    <button class="logout-btn" id="logoutBtn">로그아웃</button>
  </div>
</div>
    </div>
  </div>
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCFRZFFaU4h-LMGcHwYYoni-SyuDY0-2k8",
    authDomain: "where-is-this-ef31b.firebaseapp.com",
    projectId: "where-is-this-ef31b",
    storageBucket: "where-is-this-ef31b.firebasestorage.app",
    messagingSenderId: "959623211817",
    appId: "1:959623211817:web:96624f9be6a4297d8ba538"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  onAuthStateChanged(auth, (user) => {
    if (user) {
      const name = user.displayName || user.email.split('@')[0];
      showToast(`🌟 ${name}님, 반갑습니다!`);
    } else {
      location.href = "start.html";
    }
  });

  function showToast(message) {
    const toast = document.createElement("div");
    toast.className = "toast-msg";
    toast.innerText = message;
    document.body.appendChild(toast);
    setTimeout(() => toast.classList.add("show"), 100);
    setTimeout(() => {
      toast.classList.remove("show");
      setTimeout(() => toast.remove(), 400);
    }, 3000);
  }

  document.getElementById("logoutBtn").onclick = () => {
    signOut(auth).then(() => {
      alert("로그아웃 되었습니다.");
      location.href = "start.html";
    });
  };
document.getElementById("infoBtn").onclick = () => {
  setTimeout(() => { location.href = "index.html"; }, 200);
};

document.getElementById("diaryBtn").onclick = () => {
  setTimeout(() => { location.href = "diary.html"; }, 200);
};

document.getElementById("testBtn").onclick = () => {
  setTimeout(() => { location.href = "test.html"; }, 200);
};

document.getElementById("foodBtn").onclick = () => {
  setTimeout(() => { location.href = "food_map.html"; }, 200);
};
</script>
<script src="sound.js"></script>
</body>
</html>
